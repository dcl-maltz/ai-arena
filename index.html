<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Arena</title>
<style>
  body {
    background: #0e0e0e;
    color: #e0e0e0;
    font-family: Arial, sans-serif;
    margin: 0;
    display: flex;
    flex-direction: column;
    height: 100vh;
  }

  header {
    padding: 12px 20px;
    border-bottom: 1px solid #2a2a2a;
    font-size: 14px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: #888;
  }

  #chat {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
  }

  .msg {
    margin-bottom: 16px;
  }

  .label {
    font-size: 11px;
    text-transform: uppercase;
    color: #888;
    margin-bottom: 4px;
  }

  .content {
    background: #161616;
    padding: 10px 14px;
    border-radius: 6px;
    white-space: pre-wrap;
  }

  .user .label { color: #9aa7ff; }
  .claude .label { color: #d4a96a; }
  .gpt .label { color: #74b8a0; }

  .input-area {
    border-top: 1px solid #2a2a2a;
    padding: 12px 20px;
  }

  textarea {
    width: 100%;
    min-height: 60px;
    background: #161616;
    color: #e0e0e0;
    border: 1px solid #2a2a2a;
    padding: 10px;
    border-radius: 6px;
    resize: none;
  }

  button {
    margin-top: 8px;
    padding: 6px 12px;
    background: #161616;
    border: 1px solid #2a2a2a;
    color: #e0e0e0;
    cursor: pointer;
  }

  button:hover { background: #1e1e1e; }
</style>
</head>
<body>

<header>AI Arena — Structural Mode</header>

<div style="padding:10px 20px;border-bottom:1px solid #2a2a2a;">
  Anthropic Key:
  <input id="anthropic-key" type="password" placeholder="sk-ant-..." style="width:200px;">
  OpenAI Key:
  <input id="openai-key" type="password" placeholder="sk-..." style="width:200px;">
</div>

<div id="chat"></div>

<div class="input-area">
  <textarea id="input" placeholder="Type message..."></textarea>
  <button onclick="sendBoth()">Both Respond</button>
</div>

<script>
const GPT_TEMPERATURE = 0.85;
const CLAUDE_TEMPERATURE = 0.85;
const MAX_TOKENS = 600;

const ARENA_STYLE = `
You are participating in an AI-to-AI arena.

Always be structural and honest.

Output structure:
1) State the central claim or mechanism.
2) Identify key constraints or failure modes.
3) State uncertainty explicitly if present.
4) Give one concrete implication or test if relevant.

Rules:
- No corporate PR filler.
- No vague generalities.
- Do not bluff.
- Disagreement is allowed.
- Be concise but complete within 600 token limit.
`.trim();

let history = [];

function addMsg(role, text) {
  const div = document.createElement("div");
  div.className = "msg " + role;

  const label = document.createElement("div");
  label.className = "label";
  label.textContent = role === "user" ? "You" :
                      role === "claude" ? "Claude" : "ChatGPT";

  const content = document.createElement("div");
  content.className = "content";
  content.textContent = text;

  div.appendChild(label);
  div.appendChild(content);
  document.getElementById("chat").appendChild(div);
  document.getElementById("chat").scrollTop =
    document.getElementById("chat").scrollHeight;
}

function buildOpenAIMessages() {
  const msgs = [{ role: "system", content: ARENA_STYLE }];
  for (const h of history) {
    if (h.role === "user") msgs.push({ role: "user", content: h.content });
    if (h.role === "gpt") msgs.push({ role: "assistant", content: h.content });
    if (h.role === "claude")
      msgs.push({ role: "user", content: "[Claude said]: " + h.content });
  }
  return msgs;
}

function buildClaudeMessages() {
  const msgs = [];
  for (const h of history) {
    if (h.role === "user") msgs.push({ role: "user", content: h.content });
    if (h.role === "claude")
      msgs.push({ role: "assistant", content: h.content });
    if (h.role === "gpt")
      msgs.push({ role: "user", content: "[ChatGPT said]: " + h.content });
  }
  return msgs;
}

async function callGPT() {
  const key = document.getElementById("openai-key").value.trim();
  if (!key) return alert("Enter OpenAI key");

  const res = await fetch("https://api.openai.com/v1/chat/completions", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Authorization": "Bearer " + key
    },
    body: JSON.stringify({
      model: "gpt-4o",
      temperature: GPT_TEMPERATURE,
      max_tokens: MAX_TOKENS,
      messages: buildOpenAIMessages()
    })
  });

  const data = await res.json();
  return data.choices?.[0]?.message?.content;
}

async function callClaude() {
  const key = document.getElementById("anthropic-key").value.trim();
  if (!key) return alert("Enter Anthropic key");

  const res = await fetch("https://anthropic-proxy.dcl-maltz.workers.dev/", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "x-api-key": key,
      "anthropic-version": "2023-06-01"
    },
    body: JSON.stringify({
      model: "claude-opus-4-6",
      temperature: CLAUDE_TEMPERATURE,
      max_tokens: MAX_TOKENS,
      system: ARENA_STYLE,
      messages: buildClaudeMessages()
    })
  });

  const data = await res.json();
  return data.content?.[0]?.text;
}

async function sendBoth() {
  const text = document.getElementById("input").value.trim();
  if (!text) return;
  document.getElementById("input").value = "";

  history.push({ role: "user", content: text });
  addMsg("user", text);

  const [claudeReply, gptReply] =
    await Promise.all([callClaude(), callGPT()]);

  if (claudeReply) {
    history.push({ role: "claude", content: claudeReply });
    addMsg("claude", claudeReply);
  }

  if (gptReply) {
    history.push({ role: "gpt", content: gptReply });
    addMsg("gpt", gptReply);
  }
}
</script>

</body>
</html>
